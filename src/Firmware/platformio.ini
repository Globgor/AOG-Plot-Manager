; ============================================
; AOG Plot Manager — Teensy 4.1 Firmware
; PlatformIO Configuration
; ============================================

[platformio]
default_envs = teensy41

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200

; Build flags
build_flags =
    -D FIRMWARE_VERSION=\"0.1.0\"
    -Wall
    -Wextra

; Library dependencies
lib_deps =
    NativeEthernet
    ArduinoJson@^7

; Test framework
test_framework = unity

; Serial monitor filters
monitor_filters = direct
