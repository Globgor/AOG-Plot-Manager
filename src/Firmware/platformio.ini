; ============================================
; AOG Plot Manager — Teensy 4.1 Firmware
; PlatformIO Configuration
; ============================================

[platformio]
default_envs = teensy41

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200

; Build flags
build_flags =
    -D FIRMWARE_VERSION=\"0.1.0\"
    -D NUM_VALVES=14
    -D HEARTBEAT_TIMEOUT_MS=2000
    -Wall
    -Wextra

; Test framework
test_framework = unity

; Serial monitor filters
monitor_filters = direct
